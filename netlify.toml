[build]
  command = "npm run build"
  publish = "dist/public"

# 🔍 SPA Routing Configuration
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  command = "npm run build"

# 🔒 Security Headers
[[headers]]
  for = "/*"
  [[headers.values]]
    key = "Strict-Transport-Security"
    value = "max-age=31536000; includeSubDomains; preload"
  [[headers.values]]
    key = "X-Content-Type-Options"
    value = "nosniff"
  [[headers.values]]
    key = "X-Frame-Options"
    value = "DENY"
  [[headers.values]]
    key = "X-XSS-Protection"
    value = "1; mode=block"
  [[headers.values]]
    key = "Referrer-Policy"
    value = "strict-origin-when-cross-origin"
  [[headers.values]]
    key = "Permissions-Policy"
    value = "geolocation=(), microphone=(), camera=()"

# 🔍 SEO Sitemap Configuration
[[headers]]
  for = "/sitemap.xml"
  [[headers.values]]
    key = "Content-Type"
    value = "application/xml; charset=UTF-8"
  [[headers.values]]
    key = "Cache-Control"
    value = "public, max-age=604800, s-maxage=604800"

# 🔍 robots.txt Configuration
[[headers]]
  for = "/robots.txt"
  [[headers.values]]
    key = "Content-Type"
    value = "text/plain; charset=UTF-8"
  [[headers.values]]
    key = "Cache-Control"
    value = "public, max-age=604800, s-maxage=604800"

# 📄 HTML Pages - No Cache
[[headers]]
  for = "/*.html"
  [[headers.values]]
    key = "Cache-Control"
    value = "public, max-age=3600, s-maxage=3600"
  [[headers.values]]
    key = "Content-Type"
    value = "text/html; charset=UTF-8"

# ⚡ Static Assets - Long Cache
[[headers]]
  for = "/*.{js,css,woff,woff2,ttf,eot}"
  [[headers.values]]
    key = "Cache-Control"
    value = "public, max-age=31536000, immutable"

# 🖼️ Images - Medium Cache
[[headers]]
  for = "/*.{jpg,jpeg,png,webp,svg,gif,ico}"
  [[headers.values]]
    key = "Cache-Control"
    value = "public, max-age=2592000, s-maxage=2592000"

# 📱 JSON API Responses - Short Cache
[[headers]]
  for = "/api/*"
  [[headers.values]]
    key = "Cache-Control"
    value = "public, max-age=60, s-maxage=60"
  [[headers.values]]
    key = "Access-Control-Allow-Origin"
    value = "*"
  [[headers.values]]
    key = "Access-Control-Allow-Methods"
    value = "GET, POST, OPTIONS"
  [[headers.values]]
    key = "Access-Control-Allow-Headers"
    value = "Content-Type"
