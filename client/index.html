<head>

  <!-- 🟢 SEO Basic Tags -->

  <!-- 🟢 Structured Data (JSON-LD) - Website Schema -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Sora.tv",
      "description": "Watch free live TV channels from around the world. Stream global news, sports, entertainment channels.",
      "url": "https://sora.tv",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://sora.tv/?search={search_term_string}"
        }
      },
      "image": "https://sora.tv/placeholder-logo.png",
      "inLanguage": "en",
      "sameAs": [
        "https://twitter.com/soratv",
        "https://instagram.com/soratv"
      ]
    }
    </script>

  <!-- 🟢 Organization Schema -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Sora.tv",
      "description": "Global live TV streaming platform - Watch free channels worldwide",
      "url": "https://sora.tv",
      "logo": "https://sora.tv/placeholder-logo.png",
      "address": {
        "@type": "PostalAddress",

      },

        "https://instagram.com/soratv"
      ]
    }
    </script>

  <!-- 🟢 Video/Streaming Schema -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "VideoObject",

      "description": "Watch live TV channels from around the world free",
      "url": "https://sora.tv",
      "embedUrl": "https://sora.tv",
      "thumbnailUrl": "https://sora.tv/placeholder-logo.png",
      "uploadDate": "2026-03-02T00:00:00Z",
      "interactionStatistic": {
        "@type": "InteractionCounter",
        "interactionType": "WatchAction",
        "userInteractionCount": "1000000"
      }

    </script>
</head>

<body style="font-family: 'Cairo', Arial, sans-serif;">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx" async></script>

  <!-- 🟢 Set Canonical URL dynamically -->
  <script>
    document.querySelector('link[rel="canonical"]').href = window.location.origin;
    const schemaWebsite = document.querySelectorAll('script[type="application/ld+json"]')[0];
    const schemaOrg = document.querySelectorAll('script[type="application/ld+json"]')[1];

    if (schemaWebsite && schemaOrg) {
      const wsData = JSON.parse(schemaWebsite.innerText);
      const orgData = JSON.parse(schemaOrg.innerText);
      wsData.url = window.location.origin;
      orgData.url = window.location.origin;
      schemaWebsite.innerText = JSON.stringify(wsData);
      schemaOrg.innerText = JSON.stringify(orgData);
    }
  </script>
</body>

</html>
